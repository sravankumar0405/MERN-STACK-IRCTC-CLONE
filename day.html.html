<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    Hi, I am learning HTML!
    <header>
      <h1>IRCTC</h1>
      <h4>Indian Railway Catering & Tourism Corporation</h4>
      <p>Book train tickets online instantly</p>
    </header>
    <!-- 1. Why h1 is main heading?
         Answer:  because the h1 is big size in all heading tags, we tell the browser this is h1 heading tag, provide my content in bigger size in browser's screen.
         2. Why p for paragraph: 
         Answer: Because, the p tag is only used to create paragraph, and using the p tag we tells  the browser it is paragraph , show a small size in browser screen.3. What's the difference b/w h1, h2, h3, h4?
         Answer: All tags are headings only, but the difference is only sizes between the tags, h4 is smaller, h3 is slightly big than h4, h2 is more bigger than h3, and finally h1 is much more bigger than all other heading tags.
         -->
    <section>
      <button class="loginBtn">Login/Register/</button>
      <button>Trains</button>
      <button>Meals</button>
      <button class="cashbackBtn">Up to 10% Cashback</button>
      <button>E-wallet</button>
      <button>Alerts</button>
      <button>Other Services</button>
      <button class="contactBtn">Contact Us</button>
    </section>

    <section class="welcomeSection">
        <h2>Welcome to the IRCTC Portal</h2>
        <p>Experinece the Digital Train tickets booking system Application</p>
    </section>

    <section>
        <h3>Feature Section</h3>
        <button class="featureBox">Book Tickets</button>
        <button class="featureBox">Order Food</button>
        <button class="featureBox">Get Cashback</button>
    </section>
    <footer>
        <p class="footerContent">Copyright © 2026 - www.irctc.co.in. All Rights Reserved</p>
    </footer>
  </body>
</html>

<!-- 1. Why do we use class instead of styling each button?
     Answer: Using button elements, the styles will be applied to entire buttons in the html document. so on that case we are using this class attributes to style the specific button we want in the document.

     2. Can two buttons have same class?
     Answer: Yes, we can take same classes for two or many buttons.

     3. What's the difference between . and # in CSS?
     Answer:  . is used only if we want to style same for many elements in an document, on that time we use this . or class selector in css. And the # is used only if we style a single or unique element that will appear only 1 time in the document on that we use this # or id selector in css -->
